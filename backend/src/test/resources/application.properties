# Test datasource — H2 in-memory replaces PostgreSQL; no running DB required
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Skip schema.sql — H2 cannot execute pgvector DDL (CREATE EXTENSION, vector type, ivfflat)
spring.sql.init.mode=never

# Stub external API keys — no real Anthropic or Voyage calls are made in context-load tests
kernel.anthropic.api-key=test-key-not-used
kernel.embedding.voyage-api-key=test-key-not-used
